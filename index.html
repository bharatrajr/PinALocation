<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sthalam · స్థలం</title>
<meta name="description" content="Save, organize and find your places. Works offline.">
<meta name="theme-color" content="#1B3A5C">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --ink:#1B3A5C;          /* survey ink blue */
  --ink-deep:#12283F;
  --pin:#E23A2E;          /* classic map-pin red */
  --paper:#FAFAF7;
  --line:#E3E1D8;
  --mut:#6B7686;
  --ok:#1E7F4F;
  --radius:14px;
  --shadow:0 4px 18px rgba(18,40,63,.16);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Telugu",sans-serif;background:var(--paper);color:var(--ink-deep)}
button{font:inherit;border:0;background:none;cursor:pointer;color:inherit}
input,select,textarea{font:inherit;color:inherit}

#map{position:fixed;inset:0;z-index:1;background:#DDE6DD}

/* ---------- top bar ---------- */
.topbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;gap:8px;align-items:center;padding:10px 12px;padding-top:calc(10px + env(safe-area-inset-top,0px));pointer-events:none}
.topbar>*{pointer-events:auto}
.brand{display:flex;align-items:center;gap:8px;background:var(--ink);color:#fff;padding:8px 14px;border-radius:999px;box-shadow:var(--shadow);font-weight:700;letter-spacing:.02em}
.brand small{font-weight:400;opacity:.75}
.searchwrap{flex:1;display:flex;align-items:center;background:#fff;border-radius:999px;box-shadow:var(--shadow);padding:0 6px 0 14px;min-width:0}
.searchwrap input{flex:1;border:0;outline:0;padding:10px 0;background:none;min-width:0}
.iconbtn{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;font-size:17px;color:var(--ink)}
.iconbtn:active{background:#eef0ea}
.langbtn{background:#fff;border-radius:999px;box-shadow:var(--shadow);padding:9px 12px;font-weight:700;font-size:13px;color:var(--ink)}

/* ---------- floating map controls ---------- */
.fabcol{position:fixed;right:12px;z-index:20;display:flex;flex-direction:column;gap:10px}
.fabcol.gps{bottom:calc(180px + var(--safe-b))}
.fab{width:48px;height:48px;border-radius:50%;background:#fff;box-shadow:var(--shadow);display:grid;place-items:center;font-size:20px;color:var(--ink)}
.fab.primary{background:var(--pin);color:#fff;width:56px;height:56px;font-size:24px}
.fab:active{transform:scale(.94)}

/* ---------- crosshair add mode ---------- */
#crosshair{position:fixed;left:50%;top:50%;z-index:15;transform:translate(-50%,-100%);display:none;pointer-events:none;filter:drop-shadow(0 3px 4px rgba(0,0,0,.35))}
#crosshair svg{display:block}
body.crosshair #crosshair{display:block}
#xhbar{position:fixed;left:12px;right:12px;bottom:calc(14px + var(--safe-b));z-index:30;display:none;gap:10px}
body.crosshair #xhbar{display:flex}
body.crosshair .sheet,body.crosshair .fabcol{display:none}
#xhbar .btn{flex:1}

/* ---------- bottom sheet ---------- */
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:25;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -6px 24px rgba(18,40,63,.18);transition:transform .25s ease;transform:translateY(calc(100% - 158px - var(--safe-b)))}
.sheet.open{transform:translateY(0)}
.sheet-inner{max-height:72vh;display:flex;flex-direction:column}
.grip{width:44px;height:5px;border-radius:3px;background:var(--line);margin:10px auto 4px;flex:0 0 auto}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 8px}
.sheet-head h2{font-size:15px;font-weight:800;color:var(--ink)}
.sheet-head .count{color:var(--mut);font-weight:500;font-size:13px}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding:2px 16px 10px;scrollbar-width:none;flex:0 0 auto}
.chiprow::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:7px 13px;border-radius:999px;border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--ink-deep);background:#fff}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.sortrow{display:flex;gap:8px;align-items:center;padding:0 16px 10px;flex:0 0 auto}
.sortrow select{border:1px solid var(--line);border-radius:8px;padding:6px 8px;background:#fff;font-size:13px}
.loclist{overflow-y:auto;padding:0 10px calc(14px + var(--safe-b));flex:1}
.card{display:flex;gap:12px;align-items:center;padding:11px 8px;border-bottom:1px solid var(--line)}
.card:last-child{border-bottom:0}
.card .em{width:42px;height:42px;border-radius:12px;background:var(--paper);border:1px solid var(--line);display:grid;place-items:center;font-size:20px;flex:0 0 auto}
.card .tx{flex:1;min-width:0}
.card .tx b{display:block;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .tx span{font-size:12.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.card .dist{font-size:12px;font-weight:700;color:var(--ok);flex:0 0 auto}
.empty{padding:34px 24px;text-align:center;color:var(--mut);font-size:14px;line-height:1.6}
.empty b{color:var(--ink);display:block;margin-bottom:6px;font-size:15px}

/* ---------- modals ---------- */
.modal{position:fixed;inset:0;z-index:40;background:rgba(18,40,63,.45);display:none;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.panel{background:#fff;width:100%;max-width:560px;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;padding:18px 18px calc(20px + var(--safe-b))}
.panel h3{font-size:17px;color:var(--ink);margin-bottom:14px;font-weight:800}
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--mut);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input[type=text],.field input[type=number],.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:var(--paper);outline:0}
.field input:focus,.field textarea:focus{border-color:var(--ink)}
.field textarea{resize:vertical;min-height:70px}
.catgrid{display:flex;flex-wrap:wrap;gap:8px}
.catgrid .chip{font-size:13.5px}
.coordrow{display:flex;gap:10px}
.coordrow .field{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:12px;font-weight:700;font-size:15px}
.btn.solid{background:var(--ink);color:#fff}
.btn.red{background:var(--pin);color:#fff}
.btn.ghost{border:1.5px solid var(--line);color:var(--ink)}
.btn.sm{padding:9px 13px;font-size:13.5px;border-radius:10px}
.btnrow{display:flex;gap:10px;margin-top:16px}
.btnrow .btn{flex:1}
.photoslot{width:100%;height:120px;border:1.5px dashed var(--line);border-radius:12px;display:grid;place-items:center;color:var(--mut);font-size:13.5px;overflow:hidden;position:relative;background:var(--paper)}
.photoslot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.photoslot .rm{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:28px;height:28px;display:grid;place-items:center;z-index:2}

/* detail */
.d-photo{width:100%;height:170px;border-radius:14px;object-fit:cover;margin-bottom:12px;background:var(--paper)}
.d-title{display:flex;gap:10px;align-items:center;margin-bottom:4px}
.d-title .em{font-size:26px}
.d-title h3{margin:0}
.d-sub{color:var(--mut);font-size:13px;margin-bottom:10px}
.d-notes{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:14px;line-height:1.55;margin-bottom:12px;white-space:pre-wrap}
.d-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.d-actions .btn{width:100%}
.d-actions .wide{grid-column:1/-1}
.btn.uber{background:#000;color:#fff}
.btn.ola{background:#BFD730;color:#141414}
.btn.rapido{background:#FFCB05;color:#141414}
.reshead{padding:10px 8px 4px;font-size:12px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}

/* menu panel rows */
.mrow{display:flex;align-items:center;gap:12px;width:100%;padding:14px 6px;border-bottom:1px solid var(--line);font-size:15px;font-weight:600;text-align:left}
.mrow:last-child{border-bottom:0}
.mrow .ic{font-size:19px;width:28px;text-align:center}
.mrow small{display:block;font-weight:400;color:var(--mut);font-size:12.5px}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(190px + var(--safe-b));transform:translateX(-50%) translateY(8px);z-index:60;background:var(--ink-deep);color:#fff;padding:10px 18px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.leaflet-control-attribution{font-size:9px!important}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div id="map"></div>

<!-- top bar -->
<div class="topbar">
  <div class="brand">📍 Sthalam <small>· స్థలం</small></div>
  <div class="searchwrap">
    <input id="q" type="text" data-ph="search" placeholder="Search places…" autocomplete="off">
    <button class="iconbtn" id="btnMenu" title="Menu">☰</button>
  </div>
  <button class="langbtn" id="btnLang">తె</button>
</div>

<!-- floating controls -->
<div class="fabcol gps">
  <button class="fab" id="btnLocate" title="My location">🎯</button>
  <button class="fab primary" id="btnAdd" title="Add place">＋</button>
</div>

<!-- crosshair add mode -->
<div id="crosshair">
  <svg width="44" height="58" viewBox="0 0 44 58"><path d="M22 0C10 0 0 9.8 0 22c0 15 22 36 22 36s22-21 22-36C44 9.8 34 0 22 0z" fill="#E23A2E"/><circle cx="22" cy="21" r="8.5" fill="#fff"/></svg>
</div>
<div id="xhbar">
  <button class="btn ghost" id="xhCancel" style="background:#fff" data-i18n="cancel">Cancel</button>
  <button class="btn red" id="xhSave" data-i18n="saveSpot">Save this spot</button>
</div>

<!-- bottom sheet -->
<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <div class="grip" id="grip"></div>
    <div class="sheet-head">
      <h2 data-i18n="myPlaces">My places</h2>
      <span class="count" id="count"></span>
    </div>
    <div class="chiprow" id="chips"></div>
    <div class="sortrow">
      <label style="font-size:12.5px;color:var(--mut);font-weight:700" data-i18n="sort">Sort</label>
      <select id="sort">
        <option value="recent" data-i18n="recent">Recent first</option>
        <option value="name" data-i18n="nameAZ">Name A–Z</option>
        <option value="dist" data-i18n="nearest">Nearest first</option>
      </select>
    </div>
    <div class="loclist" id="list"></div>
  </div>
</div>

<!-- add/edit modal -->
<div class="modal" id="mEdit">
  <div class="panel">
    <h3 id="editTitle" data-i18n="addPlace">Add place</h3>
    <div class="field"><label data-i18n="name">Name</label><input type="text" id="fName" data-ph="namePh" placeholder="e.g. Amma's house"></div>
    <div class="field"><label data-i18n="category">Category</label><div class="catgrid" id="fCats"></div></div>
    <div class="coordrow">
      <div class="field"><label data-i18n="lat">Latitude</label><input type="number" step="any" id="fLat"></div>
      <div class="field"><label data-i18n="lng">Longitude</label><input type="number" step="any" id="fLng"></div>
    </div>
    <div class="field"><label data-i18n="address">Address</label><input type="text" id="fAddr" autocomplete="off"></div>
    <div class="field"><label data-i18n="notes">Notes</label><textarea id="fNotes" data-ph="notesPh" placeholder="Landmark, gate number, timings…"></textarea></div>
    <div class="field"><label data-i18n="photo">Photo</label>
      <div class="photoslot" id="photoSlot"><span data-i18n="addPhoto">📷 Tap to add photo</span></div>
      <input type="file" id="fPhoto" accept="image/*" hidden>
    </div>
    <div class="btnrow">
      <button class="btn ghost" id="editCancel" data-i18n="cancel">Cancel</button>
      <button class="btn solid" id="editSave" data-i18n="save">Save</button>
    </div>
  </div>
</div>

<!-- detail modal -->
<div class="modal" id="mDetail"><div class="panel" id="detailBody"></div></div>

<!-- menu modal -->
<div class="modal" id="mMenu">
  <div class="panel">
    <h3 data-i18n="menu">Menu &amp; backup</h3>
    <button class="mrow" id="mExpJson"><span class="ic">💾</span><span><span data-i18n="expJson">Export backup (JSON)</span><small data-i18n="expJsonS">Full backup incl. photos — reimport anytime</small></span></button>
    <button class="mrow" id="mImpJson"><span class="ic">📥</span><span><span data-i18n="impJson">Import backup (JSON)</span><small data-i18n="impJsonS">Restore places from a backup file</small></span></button>
    <input type="file" id="impFile" accept=".json,.geojson,.kml,.csv,application/json" hidden>
    <button class="mrow" id="mExpGpx"><span class="ic">🗺️</span><span><span data-i18n="expGpx">Export GPX</span><small data-i18n="expGpxS">Open in OsmAnd, Garmin, GPS apps</small></span></button>
    <button class="mrow" id="mExpKml"><span class="ic">🌐</span><span><span data-i18n="expKml">Export KML</span><small data-i18n="expKmlS">Open in Google Earth / My Maps</small></span></button>

    <div class="btnrow"><button class="btn ghost" id="menuClose" data-i18n="close">Close</button></div>
    <p style="text-align:center;color:var(--mut);font-size:12px;margin-top:12px" id="stats"></p>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* =============== i18n =============== */
const I18N = {
 en:{search:"Search places · ⏎ map",myPlaces:"My places",sort:"Sort",recent:"Recent first",nameAZ:"Name A–Z",nearest:"Nearest first",

  addPhoto:"📷 Tap to add photo",cancel:"Cancel",save:"Save",saveSpot:"Save this spot",close:"Close",menu:"Menu & backup",

  address:"Address",searchHint:"Type & press Enter to search the map",mapResults:"🌐 Map results",addrLoading:"Fetching address…",
  saveHere:"＋ Save",myPlacesHead:"📍 My places",
  saved:"Saved ✓",deleted:"Deleted",copied:"Coordinates copied",imported:"Imported",noName:"Please enter a name",
  emptyT:"No places yet",emptyS:"Tap ＋ to save your current spot, or long-press anywhere on the map.",

  cats:{home:"Home",work:"Work",customs:"Customs",land:"Land",shop:"Shop",food:"Food",temple:"Temple",other:"Other"}},

  expGpx:"GPX ఎగుమతి",expGpxS:"OsmAnd, Garmin, GPS యాప్‌లలో తెరవండి",expKml:"KML ఎగుమతి",expKmlS:"Google Earth / My Mapsలో తెరవండి",

  uber:"🚘 ఇక్కడికి Uber బుక్ చేయి",ola:"🚕 ఇక్కడికి Ola బుక్ చేయి",rapido:"🏍️ ఇక్కడికి Rapido బుక్ చేయి",rapidoHint:"చిరునామా కాపీ అయింది — Rapidoలో డ్రాప్‌గా పేస్ట్ చేయండి",

const CATS=[["home","🏠"],["work","💼"],["customs","🛃"],["land","🌾"],["shop","🛒"],["food","🍛"],["temple","🛕"],["other","⭐"]];
const CATEMO=Object.fromEntries(CATS);
let lang=localStorage.getItem("sth_lang")||"en";
const t=k=>I18N[lang][k]??k;
const tc=k=>I18N[lang].cats[k]??k;
function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll("[data-ph]").forEach(el=>el.placeholder=t(el.dataset.ph));
  document.getElementById("btnLang").textContent=lang==="en"?"తె":"En";
  renderChips();renderList();
}

/* =============== IndexedDB =============== */
let db;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open("sthalam",1);
  r.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains("locations")){
      const s=d.createObjectStore("locations",{keyPath:"id"});
      s.createIndex("created","created");
    }};
  r.onsuccess=e=>{db=e.target.result;res()};
  r.onerror=()=>rej(r.error);
});}
const tx=(mode)=>db.transaction("locations",mode).objectStore("locations");
const dbAll=()=>new Promise((res,rej)=>{const r=tx("readonly").getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
const dbPut=v=>new Promise((res,rej)=>{const r=tx("readwrite").put(v);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)});
const dbDel=id=>new Promise((res,rej)=>{const r=tx("readwrite").delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)});

const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(msg){const el=$("toast");el.textContent=msg;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2200);}
function fmt(n){return Number(n).toFixed(6);}
function haversine(a,b){const R=6371e3,rad=x=>x*Math.PI/180;
  const dLat=rad(b.lat-a.lat),dLng=rad(b.lng-a.lng);
  const h=Math.sin(dLat/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));}
function distStr(m){return m<1000?Math.round(m)+" m":(m/1000).toFixed(m<10000?1:0)+" km";}
function dl(name,text,mime){const b=new Blob([text],{type:mime});const a=document.createElement("a");
  a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);}
function blobToDataURL(blob){return new Promise(r=>{const f=new FileReader();f.onload=()=>r(f.result);f.readAsDataURL(blob)});}
function dataURLToBlob(u){const[a,b]=u.split(",");const m=a.match(/:(.*?);/)[1];const bin=atob(b);
  const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:m});}

/* compress photo to max 1280px jpeg */
function compressImage(file){return new Promise(res=>{
  const img=new Image();img.onload=()=>{
    const M=1280,sc=Math.min(1,M/Math.max(img.width,img.height));
    const c=document.createElement("canvas");c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    c.toBlob(b=>res(b||file),"image/jpeg",.8);
  };img.onerror=()=>res(file);img.src=URL.createObjectURL(file);
});}

async function revGeocode(lat,lng){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
    if(!r.ok)return "";
    return (await r.json()).display_name||"";
  }catch(_){return "";}
}
async function geoSearch(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=6&q=${encodeURIComponent(q)}`);
    return r.ok?await r.json():[];
  }catch(_){return [];}
}

/* extract lat,lng from a google maps URL */
function coordsFromGURL(u){
  if(!u)return null;
  let m=u.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/)||u.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/)||u.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  return m?{lat:+m[1],lng:+m[2]}:null;
}
function parseCSV(text){ // minimal RFC4180 parser
  const rows=[];let row=[],cur="",inQ=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(inQ){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else inQ=false;}else cur+=c;}
    else if(c==='"')inQ=true;
    else if(c===","){row.push(cur);cur="";}
    else if(c==="\n"||c==="\r"){if(c==="\r"&&text[i+1]==="\n")i++;row.push(cur);cur="";if(row.some(x=>x!==""))rows.push(row);row=[];}
    else cur+=c;}
  if(cur!==""||row.length){row.push(cur);if(row.some(x=>x!==""))rows.push(row);}
  return rows;
}
function normalizeImported(list){ // -> records ready for dbPut
  const out=[];
  for(const o of list){
    if(typeof o.lat!=="number"||typeof o.lng!=="number"||isNaN(o.lat)||isNaN(o.lng)||!o.name)continue;
    out.push({id:o.id||crypto.randomUUID(),name:String(o.name),cat:CATEMO[o.cat]?o.cat:"other",
      notes:String(o.notes||""),address:String(o.address||""),lat:o.lat,lng:o.lng,
      photo:(o.photo&&typeof o.photo==="string"&&o.photo.startsWith("data:"))?dataURLToBlob(o.photo):null,
      created:o.created||Date.now(),updated:o.updated||Date.now()});
  }
  return out;
}
$("impFile").onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  const text=await f.text();
  let recs=[],skipped=0;
  try{
    if(/\.kml$/i.test(f.name)||text.trimStart().startsWith("<?xml")||text.includes("<kml")){
      const doc=new DOMParser().parseFromString(text,"text/xml");
      for(const pm of doc.querySelectorAll("Placemark")){
        const name=pm.querySelector("name")?.textContent?.trim();
        const co=pm.querySelector("Point > coordinates")?.textContent?.trim();
        if(!name||!co){skipped++;continue;}
        const [lng,lat]=co.split(",").map(Number);
        recs.push({name,lat,lng,notes:pm.querySelector("description")?.textContent?.trim()||""});
      }
    }else if(/\.csv$/i.test(f.name)){
      const rows=parseCSV(text);
      const head=rows[0].map(h=>h.toLowerCase());
      const iT=head.indexOf("title"),iN=head.indexOf("note"),iU=head.indexOf("url");
      for(const r of rows.slice(1)){
        const url=iU>=0?r.slice(iU).join(","):""; // tolerate unquoted URLs with commas (URL is last col in Takeout)
        const c=coordsFromGURL(url);
        if(!c||!r[iT]){skipped++;continue;}
        recs.push({name:r[iT],lat:c.lat,lng:c.lng,notes:(iN>=0?r[iN]:"")||""});
      }
    }else{
      const data=JSON.parse(text);
      if(data.type==="FeatureCollection"){ // Google Takeout GeoJSON
        for(const ft of (data.features||[])){
          if(ft.geometry?.type!=="Point"){skipped++;continue;}
          const [lng,lat]=ft.geometry.coordinates;
          const pr=ft.properties||{};
          const name=pr.Title||pr.title||pr.location?.name||pr.name;
          const c=(typeof lat==="number"&&(lat!==0||lng!==0))?{lat,lng}:coordsFromGURL(pr.google_maps_url||pr.Google_Maps_URL);
          if(!name||!c){skipped++;continue;}
          recs.push({name,lat:c.lat,lng:c.lng,address:pr.location?.address||"",notes:pr.Comment||pr.note||""});
        }
      }else{ // Sthalam backup (or plain array)
        recs=Array.isArray(data)?data:(data.locations||[]);
      }
    }
    const norm=normalizeImported(recs);
    for(const rec of norm){
      const i=all.findIndex(x=>x.id===rec.id);
      if(i>=0)all[i]=rec;else all.push(rec);
      await dbPut(rec);
    }
    refreshMarkers();renderList();
    toast(`${t("imported")}: ${norm.length}${skipped?` (skipped ${skipped})`:""}`);
  }catch(err){toast("Import failed: "+err.message);}
  e.target.value="";
};

  const wpts=all.map(p=>`<wpt lat="${p.lat}" lon="${p.lng}"><name>${esc(p.name)}</name><desc>${esc([p.address,p.notes].filter(Boolean).join(" — "))}</desc><type>${esc(p.cat)}</type></wpt>`).join("\n");
  dl("sthalam.gpx",`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="Sthalam" xmlns="http://www.topografix.com/GPX/1/1">\n${wpts}\n</gpx>`,"application/gpx+xml");

$("mExpKml").onclick=()=>{
  const pm=all.map(p=>`<Placemark><name>${esc(p.name)}</name><description>${esc([p.address,p.notes].filter(Boolean).join(" — "))}</description><Point><coordinates>${p.lng},${p.lat},0</coordinates></Point></Placemark>`).join("\n");
  dl("sthalam.kml",`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Sthalam</name>\n${pm}\n</Document></kml>`,"application/vnd.google-earth.kml+xml");
};

/* =============== lang toggle =============== */
$("btnLang").onclick=()=>{lang=lang==="en"?"te":"en";localStorage.setItem("sth_lang",lang);applyI18n();};

/* =============== boot =============== */
(async function(){
  await openDB();
  all=await dbAll();
  refreshMarkers();
  applyI18n();
  if(all.length){
    const g=L.featureGroup(Object.values(markers));
    try{map.fitBounds(g.getBounds().pad(0.2));}catch(_){}
  }else{
    locate(false);
  }
  if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
})();
</script>
</body>
</html>
